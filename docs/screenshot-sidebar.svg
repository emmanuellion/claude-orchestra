<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 500" font-family="-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif">
  <!-- Background -->
  <rect width="260" height="500" fill="#111113" rx="8"/>

  <!-- Logo -->
  <circle cx="28" cy="30" r="8" fill="none" stroke="#d4a574" stroke-width="1.5"/>
  <circle cx="20" cy="22" r="3" fill="none" stroke="#d4a574" stroke-width="1"/>
  <circle cx="36" cy="22" r="3" fill="none" stroke="#d4a574" stroke-width="1"/>
  <text x="48" y="28" fill="#fafafa" font-size="14" font-weight="700" letter-spacing="-0.3">Orchestra</text>
  <text x="48" y="40" fill="#71717a" font-size="10" font-weight="500">Claude Code</text>

  <!-- Add buttons -->
  <rect x="10" y="56" width="116" height="28" rx="8" fill="#18181b" stroke="#27272a" stroke-width="1"/>
  <text x="28" y="74" fill="#a1a1aa" font-size="11" font-weight="500">+ Claude Code</text>
  <rect x="130" y="56" width="116" height="28" rx="8" fill="#18181b" stroke="#27272a" stroke-width="1"/>
  <text x="164" y="74" fill="#a1a1aa" font-size="11" font-weight="500">+ Shell</text>

  <!-- Section title -->
  <text x="14" y="108" fill="#71717a" font-size="10" font-weight="600" letter-spacing="0.8">INSTANCES</text>

  <!-- Item 1 - busy (active) -->
  <rect x="10" y="116" width="236" height="44" rx="6" fill="#1f1f23"/>
  <circle cx="26" cy="132" r="4" fill="none" stroke="#d4a574" stroke-width="1.5" stroke-dasharray="6 5">
    <animateTransform attributeName="transform" type="rotate" from="0 26 132" to="360 26 132" dur="0.7s" repeatCount="indefinite"/>
  </circle>
  <text x="40" y="131" fill="#fafafa" font-size="12" font-weight="500">Claude 1</text>
  <rect x="40" y="136" width="38" height="13" rx="3" fill="rgba(212,165,116,0.12)"/>
  <text x="44" y="146" fill="#d4a574" font-size="8" font-weight="700">CLAUDE</text>
  <text x="84" y="146" fill="#d4a574" font-size="9">Running...</text>

  <!-- Item 2 - idle -->
  <rect x="10" y="164" width="236" height="44" rx="6" fill="transparent"/>
  <circle cx="26" cy="180" r="3" fill="#71717a"/>
  <text x="40" y="179" fill="#fafafa" font-size="12" font-weight="500">Claude 2</text>
  <rect x="40" y="184" width="38" height="13" rx="3" fill="rgba(212,165,116,0.12)"/>
  <text x="44" y="194" fill="#d4a574" font-size="8" font-weight="700">CLAUDE</text>
  <text x="84" y="194" fill="#71717a" font-size="9">Idle</text>

  <!-- Item 3 - busy -->
  <rect x="10" y="212" width="236" height="44" rx="6" fill="transparent"/>
  <circle cx="26" cy="228" r="4" fill="none" stroke="#d4a574" stroke-width="1.5" stroke-dasharray="6 5">
    <animateTransform attributeName="transform" type="rotate" from="0 26 228" to="360 26 228" dur="0.7s" repeatCount="indefinite"/>
  </circle>
  <text x="40" y="227" fill="#fafafa" font-size="12" font-weight="500">Claude 3</text>
  <rect x="40" y="232" width="38" height="13" rx="3" fill="rgba(212,165,116,0.12)"/>
  <text x="44" y="242" fill="#d4a574" font-size="8" font-weight="700">CLAUDE</text>
  <text x="84" y="242" fill="#d4a574" font-size="9">Running...</text>

  <!-- Item 4 - minimized -->
  <g opacity="0.45">
    <rect x="10" y="260" width="236" height="44" rx="6" fill="transparent"/>
    <circle cx="26" cy="276" r="3" fill="#71717a"/>
    <text x="40" y="275" fill="#fafafa" font-size="12" font-weight="500">Shell 1</text>
    <rect x="40" y="280" width="32" height="13" rx="3" fill="rgba(34,197,94,0.1)"/>
    <text x="44" y="290" fill="#22c55e" font-size="8" font-weight="700">SHELL</text>
  </g>

  <!-- Item 5 - dead -->
  <rect x="10" y="308" width="236" height="44" rx="6" fill="transparent"/>
  <circle cx="26" cy="324" r="3" fill="#ef4444"/>
  <text x="40" y="323" fill="#fafafa" font-size="12" font-weight="500">Shell 2</text>
  <rect x="40" y="328" width="32" height="13" rx="3" fill="rgba(34,197,94,0.1)"/>
  <text x="44" y="338" fill="#22c55e" font-size="8" font-weight="700">SHELL</text>
  <text x="78" y="338" fill="#ef4444" font-size="9">Exited</text>

  <!-- Legend -->
  <line x1="10" y1="370" x2="246" y2="370" stroke="#27272a" stroke-width="1"/>
  <circle cx="22" cy="390" r="4" fill="none" stroke="#d4a574" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="34" y="394" fill="#a1a1aa" font-size="10">Running</text>
  <circle cx="100" cy="390" r="3" fill="#71717a"/>
  <text x="110" y="394" fill="#a1a1aa" font-size="10">Idle</text>
  <circle cx="160" cy="390" r="3" fill="#ef4444"/>
  <text x="170" y="394" fill="#a1a1aa" font-size="10">Exited</text>
  <text x="22" y="416" fill="#71717a" font-size="10" opacity="0.5">Reduced opacity = minimized</text>

  <!-- Footer -->
  <line x1="10" y1="440" x2="246" y2="440" stroke="#27272a" stroke-width="1"/>
  <rect x="14" y="456" width="22" height="20" rx="5" fill="none" stroke="#d4a574" stroke-width="1"/>
  <rect x="40" y="456" width="22" height="20" rx="5" fill="none" stroke="#27272a" stroke-width="1"/>
  <rect x="66" y="456" width="22" height="20" rx="5" fill="none" stroke="#27272a" stroke-width="1"/>
  <text x="160" y="470" fill="#71717a" font-size="10">Broadcast</text>
</svg>
