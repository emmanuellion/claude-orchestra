<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif">
  <defs>
    <linearGradient id="accent-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#e0b88a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="#09090b" rx="12"/>

  <!-- Window chrome -->
  <circle cx="20" cy="14" r="5" fill="#ef4444" opacity="0.8"/>
  <circle cx="36" cy="14" r="5" fill="#eab308" opacity="0.8"/>
  <circle cx="52" cy="14" r="5" fill="#22c55e" opacity="0.8"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="240" height="700" fill="#111113" rx="12"/>
  <rect x="228" y="0" width="12" height="700" fill="#111113"/>
  <line x1="240" y1="0" x2="240" y2="700" stroke="#27272a" stroke-width="1"/>

  <!-- Logo -->
  <circle cx="30" cy="42" r="8" fill="none" stroke="#d4a574" stroke-width="1.5"/>
  <circle cx="22" cy="34" r="3" fill="none" stroke="#d4a574" stroke-width="1"/>
  <circle cx="38" cy="34" r="3" fill="none" stroke="#d4a574" stroke-width="1"/>
  <text x="50" y="40" fill="#fafafa" font-size="14" font-weight="700" letter-spacing="-0.3">Orchestra</text>
  <text x="50" y="52" fill="#71717a" font-size="10" font-weight="500">Claude Code</text>

  <!-- Add buttons -->
  <rect x="10" y="68" width="108" height="28" rx="8" fill="#18181b" stroke="#27272a" stroke-width="1"/>
  <text x="34" y="86" fill="#a1a1aa" font-size="11" font-weight="500">+ Claude Code</text>
  <rect x="122" y="68" width="108" height="28" rx="8" fill="#18181b" stroke="#27272a" stroke-width="1"/>
  <text x="156" y="86" fill="#a1a1aa" font-size="11" font-weight="500">+ Shell</text>

  <!-- Section title -->
  <text x="14" y="118" fill="#71717a" font-size="10" font-weight="600" letter-spacing="0.8">INSTANCES</text>

  <!-- Sidebar item 1 - busy -->
  <rect x="10" y="126" width="220" height="40" rx="6" fill="#1f1f23"/>
  <circle cx="24" cy="140" r="4" fill="none" stroke="#d4a574" stroke-width="1.5" stroke-dasharray="6 5">
    <animateTransform attributeName="transform" type="rotate" from="0 24 140" to="360 24 140" dur="0.7s" repeatCount="indefinite"/>
  </circle>
  <text x="36" y="139" fill="#fafafa" font-size="12" font-weight="500">Claude 1</text>
  <rect x="36" y="144" width="38" height="13" rx="3" fill="rgba(212,165,116,0.12)"/>
  <text x="40" y="153" fill="#d4a574" font-size="8" font-weight="700">CLAUDE</text>
  <text x="80" y="153" fill="#d4a574" font-size="9">Running...</text>

  <!-- Sidebar item 2 - idle -->
  <rect x="10" y="170" width="220" height="40" rx="6" fill="transparent"/>
  <circle cx="24" cy="184" r="3" fill="#71717a"/>
  <text x="36" y="183" fill="#fafafa" font-size="12" font-weight="500">Claude 2</text>
  <rect x="36" y="188" width="38" height="13" rx="3" fill="rgba(212,165,116,0.12)"/>
  <text x="40" y="197" fill="#d4a574" font-size="8" font-weight="700">CLAUDE</text>
  <text x="80" y="197" fill="#71717a" font-size="9">Idle</text>

  <!-- Sidebar item 3 - minimized -->
  <g opacity="0.45">
    <rect x="10" y="214" width="220" height="40" rx="6" fill="transparent"/>
    <circle cx="24" cy="228" r="3" fill="#71717a"/>
    <text x="36" y="227" fill="#fafafa" font-size="12" font-weight="500">Shell 1</text>
    <rect x="36" y="232" width="32" height="13" rx="3" fill="rgba(34,197,94,0.1)"/>
    <text x="40" y="241" fill="#22c55e" font-size="8" font-weight="700">SHELL</text>
  </g>

  <!-- Sidebar item 4 - dead -->
  <rect x="10" y="258" width="220" height="40" rx="6" fill="transparent"/>
  <circle cx="24" cy="272" r="3" fill="#ef4444"/>
  <text x="36" y="271" fill="#fafafa" font-size="12" font-weight="500">Shell 2</text>
  <rect x="36" y="276" width="32" height="13" rx="3" fill="rgba(34,197,94,0.1)"/>
  <text x="40" y="285" fill="#22c55e" font-size="8" font-weight="700">SHELL</text>
  <text x="74" y="285" fill="#ef4444" font-size="9">Exited</text>

  <!-- Usage section -->
  <line x1="10" y1="560" x2="230" y2="560" stroke="#27272a" stroke-width="1"/>
  <text x="14" y="580" fill="#71717a" font-size="10" font-weight="600" letter-spacing="0.8">USAGE</text>

  <text x="14" y="600" fill="#d4a574" font-size="9" font-weight="600">claude-sonnet-4-5-20250514</text>
  <text x="14" y="614" fill="#71717a" font-size="10">Input</text>
  <text x="200" y="614" fill="#a1a1aa" font-size="9" font-weight="500" text-anchor="end" font-family="'SF Mono','Fira Code',monospace">4.56M tok</text>
  <text x="14" y="628" fill="#71717a" font-size="10">Output</text>
  <text x="200" y="628" fill="#a1a1aa" font-size="9" font-weight="500" text-anchor="end" font-family="'SF Mono','Fira Code',monospace">892K tok</text>
  <text x="14" y="642" fill="#71717a" font-size="10">Cache read</text>
  <text x="200" y="642" fill="#a1a1aa" font-size="9" font-weight="500" text-anchor="end" font-family="'SF Mono','Fira Code',monospace">12.3M tok</text>

  <!-- Footer -->
  <line x1="10" y1="660" x2="230" y2="660" stroke="#27272a" stroke-width="1"/>
  <rect x="14" y="672" width="22" height="20" rx="5" fill="none" stroke="#d4a574" stroke-width="1"/>
  <rect x="40" y="672" width="22" height="20" rx="5" fill="none" stroke="#27272a" stroke-width="1"/>
  <rect x="66" y="672" width="22" height="20" rx="5" fill="none" stroke="#27272a" stroke-width="1"/>
  <text x="160" y="686" fill="#71717a" font-size="10">Broadcast</text>

  <!-- Terminal Panel 1 (top-left) -->
  <rect x="248" y="8" width="468" height="338" rx="8" fill="#111113" stroke="#3f3f46" stroke-width="1"/>
  <rect x="249" y="9" width="466" height="36" rx="7" fill="#18181b"/>
  <line x1="249" y1="44" x2="715" y2="44" stroke="#27272a" stroke-width="1"/>

  <!-- Panel 1 header -->
  <circle cx="266" cy="27" r="4" fill="none" stroke="#d4a574" stroke-width="1.5" stroke-dasharray="6 5">
    <animateTransform attributeName="transform" type="rotate" from="0 266 27" to="360 266 27" dur="0.7s" repeatCount="indefinite"/>
  </circle>
  <text x="280" y="31" fill="#fafafa" font-size="12" font-weight="500">Claude 1</text>
  <rect x="340" y="19" width="46" height="16" rx="4" fill="rgba(212,165,116,0.12)" stroke="rgba(212,165,116,0.2)" stroke-width="0.5"/>
  <text x="347" y="30" fill="#d4a574" font-size="8" font-weight="700">CLAUDE</text>

  <!-- Terminal content 1 -->
  <text x="260" y="66" fill="#22c55e" font-size="11" font-family="'SF Mono','Fira Code',monospace">$</text>
  <text x="272" y="66" fill="#fafafa" font-size="11" font-family="'SF Mono','Fira Code',monospace">claude</text>
  <text x="260" y="86" fill="#d4a574" font-size="11" font-family="'SF Mono','Fira Code',monospace">&#10095; Analyzing codebase structure...</text>
  <text x="260" y="106" fill="#a1a1aa" font-size="11" font-family="'SF Mono','Fira Code',monospace">  Reading src/components/App.tsx</text>
  <text x="260" y="126" fill="#a1a1aa" font-size="11" font-family="'SF Mono','Fira Code',monospace">  Reading src/utils/helpers.ts</text>
  <text x="260" y="146" fill="#a1a1aa" font-size="11" font-family="'SF Mono','Fira Code',monospace">  Reading package.json</text>
  <text x="260" y="176" fill="#22c55e" font-size="11" font-family="'SF Mono','Fira Code',monospace">&#10003; Found 12 files to refactor</text>
  <text x="260" y="206" fill="#d4a574" font-size="11" font-family="'SF Mono','Fira Code',monospace">&#10095; Applying changes to App.tsx...</text>
  <text x="260" y="226" fill="#eab308" font-size="11" font-family="'SF Mono','Fira Code',monospace">  &#9998; Editing src/components/App.tsx</text>

  <!-- Quick input 1 -->
  <rect x="252" y="320" width="388" height="20" rx="5" fill="#09090b" stroke="#27272a" stroke-width="1"/>
  <text x="260" y="334" fill="#71717a" font-size="9" font-family="'SF Mono','Fira Code',monospace">Quick command...</text>
  <rect x="644" y="320" width="66" height="20" rx="5" fill="#1f1f23" stroke="#27272a" stroke-width="1"/>
  <text x="662" y="334" fill="#a1a1aa" font-size="9">Send</text>

  <!-- Terminal Panel 2 (top-right) -->
  <rect x="724" y="8" width="468" height="338" rx="8" fill="#111113" stroke="#27272a" stroke-width="1"/>
  <rect x="725" y="9" width="466" height="36" rx="7" fill="#18181b"/>
  <line x1="725" y1="44" x2="1191" y2="44" stroke="#27272a" stroke-width="1"/>

  <!-- Panel 2 header -->
  <circle cx="742" cy="27" r="3" fill="#71717a"/>
  <text x="756" y="31" fill="#fafafa" font-size="12" font-weight="500">Claude 2</text>
  <rect x="816" y="19" width="46" height="16" rx="4" fill="rgba(212,165,116,0.12)" stroke="rgba(212,165,116,0.2)" stroke-width="0.5"/>
  <text x="823" y="30" fill="#d4a574" font-size="8" font-weight="700">CLAUDE</text>

  <!-- Terminal content 2 -->
  <text x="736" y="66" fill="#22c55e" font-size="11" font-family="'SF Mono','Fira Code',monospace">$</text>
  <text x="748" y="66" fill="#fafafa" font-size="11" font-family="'SF Mono','Fira Code',monospace">claude</text>
  <text x="736" y="86" fill="#fafafa" font-size="11" font-family="'SF Mono','Fira Code',monospace">Claude Code v1.2.0</text>
  <text x="736" y="116" fill="#d4a574" font-size="11" font-family="'SF Mono','Fira Code',monospace">&#10095;</text>
  <rect x="750" y="106" width="8" height="14" fill="#d4a574" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0;0.7" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Bottom empty area hint -->
  <rect x="248" y="354" width="944" height="338" rx="8" fill="#111113" stroke="#27272a" stroke-width="1" stroke-dasharray="4 4" opacity="0.3"/>
  <text x="720" y="524" fill="#71717a" font-size="12" text-anchor="middle" opacity="0.4">Available space for more terminals</text>
</svg>
