<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 300" font-family="-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif">
  <!-- Background -->
  <rect width="260" height="300" fill="#111113" rx="8"/>

  <!-- Section title -->
  <text x="14" y="24" fill="#71717a" font-size="10" font-weight="600" letter-spacing="0.8">USAGE</text>
