  <!-- Separator -->
  <line x1="14" y1="140" x2="246" y2="140" stroke="#27272a" stroke-width="1"/>

  <!-- Model 2 -->
  <text x="14" y="160" fill="#d4a574" font-size="9" font-weight="600">claude-opus-4-6</text>

