  <text x="240" y="68" fill="#a1a1aa" font-size="9" font-weight="500" text-anchor="end" font-family="'SF Mono','Fira Code',monospace">4.56M tok</text>

  <text x="14" y="84" fill="#71717a" font-size="10">Output</text>
