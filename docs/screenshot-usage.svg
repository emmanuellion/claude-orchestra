  <text x="14" y="116" fill="#71717a" font-size="10">Cache create</text>
  <text x="240" y="116" fill="#a1a1aa" font-size="9" font-weight="500" text-anchor="end" font-family="'SF Mono','Fira Code',monospace">1.23M tok</text>

